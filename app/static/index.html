<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Race Predictor | ML Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --f1-red: #E10600;
      --f1-dark: #15151E;
      --f1-darker: #0A0A0A;
      --f1-gray: #38383F;
      --text-main: #FFFFFF;
      --text-muted: #949498;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(circle at top, #1a1a24 0%, var(--f1-darker) 100%);
      color: var(--text-main);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--f1-darker); }
    ::-webkit-scrollbar-thumb { background: var(--f1-gray); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--f1-red); }

    header {
      background: rgba(21, 21, 30, 0.8);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      border-bottom: 2px solid var(--f1-red);
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    header h1 span { color: var(--f1-red); }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-left: 15px; letter-spacing: 1px; }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .container { grid-template-columns: 2fr 1fr; }
      .main-panel { grid-row: span 2; }
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .card:hover { border-color: rgba(225, 6, 0, 0.3); }

    .card h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: var(--f1-red);
      border-radius: 2px;
    }

    .controls { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

    input, select {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--f1-gray);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      width: 140px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--f1-red);
      box-shadow: 0 0 10px rgba(225, 6, 0, 0.2);
    }

    button {
      background: var(--f1-red);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: #ff1e15;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(225, 6, 0, 0.4);
    }

    button:active { transform: translateY(0); }
    button:disabled { background: var(--f1-gray); color: #888; cursor: not-allowed; transform: none; box-shadow: none; }

    .status {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 16px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status.ok  { color: #00ff88; }
    .status.err { color: #ff3333; }

    /* Таблица предсказаний */
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 20px; }

    th {
      text-align: left;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 16px 8px 16px;
    }

    td {
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
    }

    tr td:first-child { border-radius: 8px 0 0 8px; }
    tr td:last-child { border-radius: 0 8px 8px 0; }
    tr:hover td { background: rgba(255, 255, 255, 0.06); }

    .pos { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; width: 60px; text-align: center; }

    tr.podium-1 td { background: linear-gradient(90deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0) 100%); border-left: 4px solid var(--gold); }
    tr.podium-2 td { background: linear-gradient(90deg, rgba(192, 192, 192, 0.1) 0%, rgba(192, 192, 192, 0) 100%); border-left: 4px solid var(--silver); }
    tr.podium-3 td { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, rgba(205, 127, 50, 0) 100%); border-left: 4px solid var(--bronze); }

    .podium-1 .pos { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .podium-2 .pos { color: var(--silver); text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
    .podium-3 .pos { color: var(--bronze); text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

    .driver-code { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px;}

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.1);
      color: #ddd;
      letter-spacing: 0.5px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--f1-gray);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    .metric .val { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; color: #00ff88; text-shadow: 0 0 15px rgba(0, 255, 136, 0.3);}
    .metric .lbl { font-size: 13px; color: var(--text-muted); text-transform: uppercase; margin-top: 8px; font-weight: 600; letter-spacing: 1px;}

    #results-table { display: none; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  </style>
</head>
<body>

<header>
  <h1>F1 <span>Predictor</span></h1>
  <div class="subtitle">AI Race Strategy & Telemetry</div>
</header>

<div class="container">

  <div class="card main-panel">
    <h2>Симуляция гонки</h2>
    <div class="controls">
      <div class="field">
        <label>Сезон</label>
        <input type="number" id="year" value="2026" min="2024" max="2030">
      </div>
      <div class="field">
        <label>Раунд (ГП)</label>
        <input type="number" id="gp" value="1" min="1" max="24">
      </div>
      <button onclick="predict()">Запуск симуляции</button>
    </div>
    <div class="status" id="predict-status">Ожидание параметров...</div>

    <div id="results-table">
      <table>
        <thead>
          <tr>
            <th>Поз</th>
            <th>Пилот</th>
            <th>Шасси</th>
            <th>Квала</th>
            <th>Очки в ЧМ</th>
          </tr>
        </thead>
        <tbody id="predict-body"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>Ядро модели</h2>
    <button onclick="loadModelInfo()" style="padding: 8px 16px; font-size: 14px; margin-bottom: 16px; width: 100%;">Диагностика</button>
    <div class="model-info" id="model-info"></div>
    <div class="status" id="model-status"></div>
  </div>

  <div class="card">
    <h2>Датасет</h2>
    <div class="field" style="margin-bottom: 15px;">
      <label>Обучающая выборка (годы)</label>
      <input type="text" id="train-years" value="2024,2025" style="width:100%">
    </div>
    <button onclick="trainModel()" id="train-btn" style="width: 100%;">Тренировать</button>
    <div class="status" id="train-status">Готов к парсингу телеметрии.</div>
  </div>

</div>

<script>
  const api = '';

  async function predict() {
    const year = document.getElementById('year').value;
    const gp   = document.getElementById('gp').value;
    const st   = document.getElementById('predict-status');
    const tbl  = document.getElementById('results-table');

    st.className = 'status';
    st.innerHTML = '⚙️ Вычисляю телеметрию и погодные условия...';
    tbl.style.display = 'none';

    try {
      const r = await fetch(`${api}/predict?gp=${gp}&year=${year}`);
      const d = await r.json();

      if (!r.ok) throw new Error(d.detail || 'Ошибка API');

      const body = document.getElementById('predict-body');
      body.innerHTML = d.prediction.map((p, index) => {
        let rowClass = '';
        if (p.predicted_position === 1) rowClass = 'podium-1';
        else if (p.predicted_position === 2) rowClass = 'podium-2';
        else if (p.predicted_position === 3) rowClass = 'podium-3';

        return `
          <tr class="${rowClass}">
            <td class="pos">${p.predicted_position}</td>
            <td class="driver-code">${p.code}</td>
            <td><span class="badge">${p.constructorId}</span></td>
            <td>P${p.qualiPosition}</td>
            <td>${p.driver_points} pts</td>
          </tr>`;
      }).join('');

      st.className = 'status ok';
      st.innerHTML = `🟢 Анализ завершен. Модель: <strong>${d.model_used}</strong>`;
      tbl.style.display = 'table';

    } catch(e) {
      st.className = 'status err';
      st.innerHTML = '🔴 Ошибка: ' + e.message;
    }
  }

  async function loadModelInfo() {
    const st = document.getElementById('model-status');
    const el = document.getElementById('model-info');
    st.textContent = 'Опрашиваю ядро...';
    el.innerHTML = '';

    try {
      const r = await fetch(`${api}/model/info`);
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail);

      el.innerHTML = Object.entries(d)
        .filter(([k]) => k !== 'winner')
        .map(([name, v]) => `
          <div class="metric">
            <div class="val">${v.Status === 'Trained' ? 'ONLINE' : 'OFFLINE'}</div>
            <div class="lbl">${name} | База: ${v.Races || 0} Гран-при</div>
          </div>`
        ).join('');

      st.className = 'status ok';
      st.innerHTML = `🟢 Текущий алгоритм: <strong>${d.winner}</strong>`;
    } catch(e) {
      st.className = 'status err';
      st.innerHTML = '🔴 Системный сбой: ' + e.message;
    }
  }

  async function trainModel() {
    const years = document.getElementById('train-years').value;
    const btn   = document.getElementById('train-btn');
    const st    = document.getElementById('train-status');

    btn.disabled = true;
    st.className = 'status';
    st.innerHTML = '⚙️ Запущен сбор телеметрии. Пожалуйста, подождите...';

    try {
      const r = await fetch(`${api}/train?years=${years}`, { method: 'POST' });
      const d = await r.json();
      st.className = 'status ok';
      st.innerHTML = `🟢 ${d.message}<br>💡 ${d.tip}`;
    } catch(e) {
      st.className = 'status err';
      st.innerHTML = '🔴 Ошибка: ' + e.message;
    } finally {
      setTimeout(() => { btn.disabled = false; }, 5000);
    }
  }

  loadModelInfo();
</script>
</body>
</html>
